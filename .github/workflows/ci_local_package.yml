name: local_package_test

on:
  push:
    branches: ["main"]
    paths:
      - "LocalPackage/**"
  pull_request:
    branches: ["**"]
    paths:
      - "LocalPackage/**"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Show Swift version
        run: swift --version

      - name: Run tests
        run: swift test --package-path LocalPackage
