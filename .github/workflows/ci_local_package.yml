name: local_package_test

on:
  push:
    branches: ["main"]
    paths:
      - "LocalPackage/**"
  pull_request:
    branches: ["**"]
    paths:
      - "LocalPackage/**"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SWIFT_VERSION: "6.2"
      SWIFTLY_HOME_DIR: ${{ github.workspace }}/.swiftly
      SWIFTLY_BIN_DIR: ${{ github.workspace }}/.swiftly/bin
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Cache Swift toolchain
        id: cache-swift
        uses: actions/cache@v4
        with:
          path: ${{ env.SWIFTLY_HOME_DIR }}
          key: swift-toolchain-${{ runner.os }}-${{ env.SWIFT_VERSION }}

      - name: Setup Swift
        if: steps.cache-swift.outputs.cache-hit != 'true'
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ env.SWIFT_VERSION }}

      - name: Restore Swift PATH from cache
        if: steps.cache-swift.outputs.cache-hit == 'true'
        run: echo "${{ env.SWIFTLY_BIN_DIR }}" >> $GITHUB_PATH

      - name: Show Swift version
        run: swift --version

      - name: Run tests
        run: swift test --package-path LocalPackage
