name: local_package_test

on:
  push:
    branches: ["main"]
    paths:
      - "LocalPackage/**"
  pull_request:
    branches: ["**"]
    paths:
      - "LocalPackage/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: macos-15
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.1.1.app
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Select Xcode version
        run: sudo xcode-select -s '${{ env.DEVELOPER_DIR }}/Contents/Developer'

      - name: Show Swift version
        run: swift --version

      - name: Run tests with coverage
        run: swift test --package-path LocalPackage --enable-code-coverage

      - name: Setup Node.js
        if: github.event_name == 'pull_request'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Danger
        if: github.event_name == 'pull_request'
        run: npm install -g danger

      - name: Cache ProjectTools build
        if: github.event_name == 'pull_request'
        uses: actions/cache@v4
        with:
          path: ProjectTools/.build
          key: project-tools-${{ runner.os }}-${{ hashFiles('ProjectTools/Package.resolved') }}
          restore-keys: |
            project-tools-${{ runner.os }}-

      - name: Build ProjectTools
        if: github.event_name == 'pull_request'
        run: swift build --package-path ProjectTools --scratch-path ProjectTools/.build

      - name: Cache DangerTools build
        if: github.event_name == 'pull_request'
        uses: actions/cache@v4
        with:
          path: DangerTools/.build
          key: danger-tools-${{ runner.os }}-${{ hashFiles('DangerTools/Package.resolved') }}
          restore-keys: |
            danger-tools-${{ runner.os }}-

      - name: Build DangerTools
        if: github.event_name == 'pull_request'
        run: swift build --package-path DangerTools --scratch-path DangerTools/.build

      - name: Run Danger (Coverage)
        if: github.event_name == 'pull_request'
        working-directory: DangerTools
        run: swift run danger-swift ci --dangerfile DangerfileCoverage.swift --cwd .. --id "danger-coverage"
        env:
          GITHUB_TOKEN: ${{ secrets.DANGER_GITHUB_API_TOKEN }}
