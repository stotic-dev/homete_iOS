name: local_package_test

on:
  push:
    branches: ["main"]
    paths:
      - "LocalPackage/**"
  pull_request:
    branches: ["**"]
    paths:
      - "LocalPackage/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SWIFT_VERSION: "6.2"
      SWIFT_TOOLCHAIN_DIR: /opt/hostedtoolcache/swift-Ubuntu
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Cache Swift toolchain
        id: cache-swift
        uses: actions/cache@v4
        with:
          path: ${{ env.SWIFT_TOOLCHAIN_DIR }}
          key: swift-toolchain-${{ runner.os }}-${{ env.SWIFT_VERSION }}

      - name: Setup Swift
        if: steps.cache-swift.outputs.cache-hit != 'true'
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ env.SWIFT_VERSION }}

      - name: Restore Swift PATH from cache
        if: steps.cache-swift.outputs.cache-hit == 'true'
        run: |
          SWIFT_BIN=$(find ${{ env.SWIFT_TOOLCHAIN_DIR }} -name swift -type f -path "*/usr/bin/swift" | head -1)
          echo "$(dirname "$SWIFT_BIN")" >> $GITHUB_PATH

      - name: Show Swift version
        run: swift --version

      - name: Run tests with coverage
        run: swift test --package-path LocalPackage --enable-code-coverage

      - name: Regenerate coverage JSON for production targets only
        if: github.event_name == 'pull_request'
        run: |
          BINARY=$(find LocalPackage/.build/debug -maxdepth 1 -name "*PackageTests" -type f | head -1)
          PROFDATA=$(find LocalPackage/.build/debug/codecov -name "*.profdata" | head -1)
          JSON_PATH=$(find LocalPackage/.build/debug/codecov -name "*.json" | head -1)
          llvm-cov export "$BINARY" \
            -instr-profile="$PROFDATA" \
            -format=json \
            -ignore-filename-regex=".*Tests.*" \
            > "$JSON_PATH"

      - name: Setup Node.js
        if: github.event_name == 'pull_request'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Danger
        if: github.event_name == 'pull_request'
        run: npm install -g danger

      - name: Cache ProjectTools build
        if: github.event_name == 'pull_request'
        uses: actions/cache@v4
        with:
          path: ProjectTools/.build
          key: project-tools-${{ runner.os }}-${{ env.SWIFT_VERSION }}-${{ hashFiles('ProjectTools/Package.resolved') }}
          restore-keys: |
            project-tools-${{ runner.os }}-${{ env.SWIFT_VERSION }}-

      - name: Build ProjectTools
        if: github.event_name == 'pull_request'
        run: swift build --package-path ProjectTools --scratch-path ProjectTools/.build

      - name: Run Danger (Coverage)
        if: github.event_name == 'pull_request'
        working-directory: ProjectTools
        run: swift run danger-swift ci --dangerfile DangerfileCoverage.swift --cwd .. --id "danger-coverage"
        env:
          GITHUB_TOKEN: ${{ secrets.DANGER_GITHUB_API_TOKEN }}
